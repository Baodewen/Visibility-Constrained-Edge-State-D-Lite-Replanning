<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 z" fill="#f59e0b"/></marker>
    <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1400" height="820" rx="36" fill="#f7f9fd"/>
  <text x="700" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">VCES-D* Lite: Visibility-Constrained Edge-State Replanning</text>
  <text x="700" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">front 3×3 scan → edge-state update → D* Lite local repair → certified move</text>
  <g transform="translate(70,140)" filter="url(#shadow)">
    <rect x="0" y="0" width="470" height="560" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="235" y="42" text-anchor="middle" font-family="Arial" font-size="22" font-weight="800" fill="#0f172a">1. Scan front 3×3</text>
    <g transform="translate(62,82)">
      <rect x="0" y="0" width="342" height="342" rx="10" fill="#fbfdff" stroke="#0f172a" stroke-width="4"/>
      <g stroke="#e5eaf2" stroke-width="2">
        <line x1="38" y1="0" x2="38" y2="342"/><line x1="76" y1="0" x2="76" y2="342"/><line x1="114" y1="0" x2="114" y2="342"/><line x1="152" y1="0" x2="152" y2="342"/><line x1="190" y1="0" x2="190" y2="342"/><line x1="228" y1="0" x2="228" y2="342"/><line x1="266" y1="0" x2="266" y2="342"/><line x1="304" y1="0" x2="304" y2="342"/>
        <line x1="0" y1="38" x2="342" y2="38"/><line x1="0" y1="76" x2="342" y2="76"/><line x1="0" y1="114" x2="342" y2="114"/><line x1="0" y1="152" x2="342" y2="152"/><line x1="0" y1="190" x2="342" y2="190"/><line x1="0" y1="228" x2="342" y2="228"/><line x1="0" y1="266" x2="342" y2="266"/><line x1="0" y1="304" x2="342" y2="304"/>
      </g>
      <rect x="152" y="76" width="114" height="114" rx="8" fill="#60a5fa" opacity="0.20"/>
      <text x="209" y="137" text-anchor="middle" font-family="Arial" font-size="16" font-weight="800" fill="#1d4ed8">front 3×3</text>
      <g stroke-linecap="round" stroke-width="8">
        <line x1="152" y1="76" x2="152" y2="114" stroke="#22c55e"/>
        <line x1="190" y1="76" x2="190" y2="114" stroke="#2563eb"/>
        <line x1="228" y1="114" x2="266" y2="114" stroke="#0f172a"/>
        <line x1="114" y1="190" x2="152" y2="190" stroke="#cbd5e1"/>
      </g>
      <g transform="translate(132,154)">
        <rect x="0" y="0" width="54" height="44" rx="13" fill="#2563eb"/>
        <circle cx="16" cy="18" r="5" fill="#fff"/><circle cx="38" cy="18" r="5" fill="#fff"/>
        <path d="M18 31 Q27 38 36 31" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <polygon points="54,13 78,22 54,31" fill="#f59e0b"/>
      </g>
    </g>
    <text x="235" y="485" text-anchor="middle" font-family="Arial" font-size="18" fill="#334155">Only visible edges become trusted.</text>
    <text x="235" y="516" text-anchor="middle" font-family="Arial" font-size="16" fill="#64748b">grey = unknown · green = free · black = blocked</text>
  </g>
  <g transform="translate(595,150)" filter="url(#shadow)">
    <rect x="0" y="0" width="300" height="530" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="150" y="42" text-anchor="middle" font-family="Arial" font-size="22" font-weight="800" fill="#0f172a">2. Edge state</text>
    <g transform="translate(42,88)">
      <rect x="0" y="0" width="216" height="78" rx="18" fill="#f8fafc" stroke="#e2e8f0"/><circle cx="38" cy="39" r="16" fill="#cbd5e1"/><text x="74" y="46" font-family="Arial" font-size="20" font-weight="700" fill="#334155">UNKNOWN</text>
      <rect x="0" y="120" width="216" height="78" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/><circle cx="38" cy="159" r="16" fill="#22c55e"/><text x="74" y="166" font-family="Arial" font-size="20" font-weight="700" fill="#166534">FREE = 1</text>
      <rect x="0" y="240" width="216" height="78" rx="18" fill="#fef2f2" stroke="#fecaca"/><circle cx="38" cy="279" r="16" fill="#0f172a"/><text x="74" y="286" font-family="Arial" font-size="20" font-weight="700" fill="#991b1b">BLOCKED = ∞</text>
    </g>
    <path d="M150 420 C120 390 105 365 120 335" stroke="#f59e0b" stroke-width="7" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/>
    <text x="150" y="460" text-anchor="middle" font-family="Arial" font-size="17" fill="#334155">edge cost changed?</text>
  </g>
  <g transform="translate(950,140)" filter="url(#shadow)">
    <rect x="0" y="0" width="380" height="560" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="190" y="42" text-anchor="middle" font-family="Arial" font-size="22" font-weight="800" fill="#0f172a">3. D* Lite repair</text>
    <g transform="translate(58,86)">
      <circle cx="82" cy="86" r="54" fill="#ede9fe" stroke="#8b5cf6" stroke-width="5"/><circle cx="82" cy="86" r="22" fill="#8b5cf6"/>
      <g stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"><line x1="82" y1="20" x2="82" y2="0"/><line x1="82" y1="172" x2="82" y2="152"/><line x1="16" y1="86" x2="-4" y2="86"/><line x1="168" y1="86" x2="148" y2="86"/><line x1="36" y1="40" x2="22" y2="26"/><line x1="128" y1="132" x2="142" y2="146"/><line x1="36" y1="132" x2="22" y2="146"/><line x1="128" y1="40" x2="142" y2="26"/></g>
      <text x="220" y="60" font-family="Arial" font-size="21" font-weight="800" fill="#4c1d95">UpdateVertex</text>
      <text x="220" y="94" font-family="Arial" font-size="21" font-weight="800" fill="#4c1d95">Repair path</text>
      <text x="220" y="128" font-family="Arial" font-size="16" fill="#64748b">only affected nodes</text>
    </g>
    <g transform="translate(42,270)"><path d="M0 70 C60 0 135 150 220 55 C250 25 275 20 305 30" stroke="#f59e0b" stroke-width="9" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><circle cx="0" cy="70" r="18" fill="#2563eb"/><circle cx="305" cy="30" r="18" fill="#16a34a"/></g>
    <rect x="50" y="430" width="280" height="72" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="190" y="459" text-anchor="middle" font-family="Arial" font-size="18" font-weight="800" fill="#9a3412">Next edge certified?</text>
    <text x="190" y="486" text-anchor="middle" font-family="Arial" font-size="15" fill="#9a3412">scan → repair → move</text>
  </g>
  <path d="M545 420 C575 420 575 420 595 420" stroke="#2563eb" stroke-width="8" fill="none" marker-end="url(#blueArrow)" stroke-linecap="round"/>
  <path d="M897 420 C925 420 925 420 950 420" stroke="#2563eb" stroke-width="8" fill="none" marker-end="url(#blueArrow)" stroke-linecap="round"/>
  <text x="700" y="760" text-anchor="middle" font-family="Arial" font-size="20" fill="#475569">Candidate path may cross unknown edges, but the robot moves only after the next edge is certified FREE.</text>
</svg>
